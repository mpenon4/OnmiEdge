name: OmniEdge Studio CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, main, develop ]

jobs:
  backend-tests:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install fastapi uvicorn PyYAML flake8
    - name: Lint
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

  frontend-tests:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package.json'
    - name: Install dependencies
      run: npm install
    - name: Build Project
      run: CI=false NEXT_TELEMETRY_DISABLED=1 npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Images
      run: |
        if [ -f backend/Dockerfile ]; then docker build -t omniedge-backend:latest ./backend; fi
        if [ -f frontend/Dockerfile ]; then docker build -t omniedge-frontend:latest ./frontend; fi